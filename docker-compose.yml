# =============================================================================
# LFM Lean Startup — Stack de développement local
# =============================================================================
# Services :
#   postgres   : base de données principale (schéma + seeds)
#   mlflow     : serveur de tracking des expériences
#   airflow-*  : orchestrateur du pipeline (webserver + scheduler + init)
#   api        : API FastAPI (uniquement si le modèle est disponible)
#
# Démarrage :
#   docker-compose up -d postgres mlflow         # infra seule
#   docker-compose up -d                         # stack complète
#
# Premier lancement :
#   docker-compose up airflow-init               # initialise Airflow une fois
#   docker-compose up -d                         # ensuite lancer tout
# =============================================================================

networks:
  lfm-network:
    driver: bridge

volumes:
  postgres_data:
  mlflow_data:
  airflow_logs:
  airflow_plugins:

# -----------------------------------------------------------------------------
# Airflow — base commune pour webserver, scheduler et init
# -----------------------------------------------------------------------------

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: lfm-airflow:local
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR:                   LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:       postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-lfm_lean_startup}
    AIRFLOW__CORE__FERNET_KEY:                 ${AIRFLOW_FERNET_KEY:-""}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES:              "false"
    AIRFLOW__API__AUTH_BACKENDS:               airflow.api.auth.backend.basic_auth
    # Variables d'environnement transmises aux DAGs
    POSTGRES_HOST:     postgres
    POSTGRES_PORT:     5432
    POSTGRES_DB:       ${POSTGRES_DB:-lfm_lean_startup}
    POSTGRES_USER:     ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PUBLIC_MLFLOW_TRACKING_URI: ${PUBLIC_MLFLOW_TRACKING_URI:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./configs:/opt/airflow/configs
    - ./scripts:/opt/airflow/scripts
    - ./.ssh:/opt/airflow/.ssh:ro
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lfm-network

# -----------------------------------------------------------------------------
# SERVICES
# -----------------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — base de données principale
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: lfm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lfm_lean_startup}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Exécution automatique du schéma et des seeds au premier lancement
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seeds/lean_concepts.sql:/docker-entrypoint-initdb.d/02_lean_concepts.sql:ro
      - ./database/seeds/risk_patterns.sql:/docker-entrypoint-initdb.d/03_risk_patterns.sql:ro
      - ./database/seeds/sector_benchmarks.sql:/docker-entrypoint-initdb.d/04_sector_benchmarks.sql:ro
      - ./database/seeds/investment_criteria.sql:/docker-entrypoint-initdb.d/05_investment_criteria.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lfm-network

  # ---------------------------------------------------------------------------
  # MLflow — tracking des expériences et Model Registry
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: lfm-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-lfm_lean_startup}
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000
    networks:
      - lfm-network

  # Initialisation Airflow (à lancer une seule fois)
  airflow-init:
    <<: *airflow-common
    container_name: lfm-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username ${AIRFLOW_USER:-admin} \
          --password ${AIRFLOW_PASSWORD:-admin} \
          --firstname Admin \
          --lastname LFM \
          --role Admin \
          --email admin@lfm-lean.local
        echo "Airflow initialisé."
    restart: "no"

  # Webserver Airflow — UI sur http://localhost:8080
  airflow-webserver:
    <<: *airflow-common
    container_name: lfm-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Scheduler Airflow — déclenche les DAGs
  airflow-scheduler:
    <<: *airflow-common
    container_name: lfm-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # API FastAPI (optionnel — nécessite le modèle fine-tuné)
  # Commenter si le modèle n'est pas encore disponible
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lfm-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-lfm_lean_startup}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      MODEL_PATH:        /app/models/lfm25-350m-lean
      CORS_ORIGINS:      ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./models:/app/models:ro  # modèle en lecture seule
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lfm-network
    profiles:
      - with-model   # activer avec : docker-compose --profile with-model up
