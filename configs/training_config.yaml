# Configuration pour le fine-tuning LoRA de LiquidAI LFM2.5-350M

model_id: "LiquidAI/LFM2.5-350M-Base"
train_path: "data/liquid/train_liquid.jsonl"
eval_path: "data/liquid/val_liquid.jsonl"
output_dir: "artifacts/lfm25_350m_lean_startup"

# Paramètres d'entraînement SFT (Supervised Fine-Tuning)
training_args:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  gradient_checkpointing: true
  bf16: true  # Passer à false si le GPU ne supporte pas bf16
  fp16: false
  max_seq_length: 1024
  report_to: "mlflow" # Intégration MLflow

# Configuration LoRA (Low-Rank Adaptation)
lora_args:
  r: 16
  lora_alpha: 32
  target_modules: 
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
